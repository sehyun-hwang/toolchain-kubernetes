  #     - name: service.namespace
  #       default: default
  #     - name: deployment.environment
  #       default: default
  # memory_limiter:
  #   # 80% of maximum memory up to 2G
  #   limit_mib: 1500
  #   # 25% of limit up to 2G
  #   spike_limit_mib: 512
  #   check_interval: 5s
  #
  #   # 50% of the maximum memory
  #   limit_percentage: 50
  #   # 20% of max memory usage spike expected
  #   spike_limit_percentage: 20
  # queued_retry:
  #   num_workers: 4
  #   queue_size: 100
  #   retry_on_failure: true
extensions:
  zpages: {}
exporters:
  clickhousetraces:
    datasource: tcp://default:CLICKHOUSE_PASSWORD@clickhouse:9000/signoz_traces
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      queue_size: 100
      num_consumers: 5
  clickhousemetricswrite:
    endpoint: tcp://default:CLICKHOUSE_PASSWORD@clickhouse:9000/signoz_metrics
    resource_to_telemetry_conversion:
      enabled: false

service:
  extensions: [zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousemetricswrite]
