  #       6ms,
  #       10ms,
  #       50ms,
  #       100ms,
  #       250ms,
  #       500ms,
  #       1000ms,
  #       1400ms,
  #       2000ms,
  #       5s,
  #       10s,
  #       20s,
  #       40s,
  #       60s,
  #     ]
  #   dimensions_cache_size: 10000
