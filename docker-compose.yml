version: "3.5"
services:
  clickhouse:
    image: clickhouse:lts
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_PASSWORD: "CLICKHOUSE_PASSWORD"
    volumes:
      - ./otel/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  otel:
    image: signoz/signoz-otel-collector:0.111.16
    ports:
      - 4318:4318
    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - clickhouse
    restart: unless-stopped

  iam-pgbouncer:
    build: pgbouncer
    ports:
      - 6432:6432
    env_file: pgbouncer.env
    user: root
    volumes:
      - ~/.aws:/root/.aws

  tsed-server:
    build: tsed
    ports:
      - "8081:8081"
    depends_on:
      - iam-pgbouncer

  pgbouncer:
    image: edoburu/pgbouncer
    working_dir: /etc/pgbouncer
    environment:
      LISTEN_PORT: "6432"
      AUTH_TYPE: trust
      SERVER_TLS_SSLMODE: verify-ca
      SERVER_TLS_CA_FILE: cert/bundle.pem # dev: userlist.sh
      # SERVER_TLS_CA_FILE: bundle.pem # prod: ./userlist
      VERBOSE: "3"
    volumes:
      - pgbouncer-cert:/etc/pgbouncer/cert
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt

  kube-apiserver-proxy:
    image: nginx
    ports:
      - 8080:80
    volumes:
      - ./kube-apiserver-proxy/entrypoint.d/55-mock-ca.sh:/docker-entrypoint.d/55-mock-ca.sh
      - ./kube-apiserver-proxy/entrypoint.d/59-certificate.sh:/docker-entrypoint.d/59-certificate.sh
      - ./kube-apiserver-proxy/proxy-pass.conf.template:/etc/nginx/templates/proxy-pass.conf.template
      - ./kube-apiserver-proxy/nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      KUBERNETES_SERVICE_HOST: 127.0.0.1
      KUBERNETES_SERVICE_PORT_HTTPS: 443
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx

volumes:
  pgbouncer-cert:
